name: 客服智能体评测集 v1
description: 用于评估 AI 客服智能体的多维度测试集
dataset_type: qa
tags:
  - 客服
  - 售前
  - 售后
  - 中文本地化

test_cases:
  - case_id: PRE_SALE_001
    input: "你们的产品多少钱？"
    expected_output: "提供产品的价格区间和购买渠道信息"
    categories: ["售前咨询", "价格查询"]
    objectives: ["友好度", "信息准确"]

  - case_id: PRE_SALE_002
    input: "这个功能和竞品相比有什么优势？"
    expected_output: "客观对比核心功能差异，不贬低竞品"
    categories: ["售前咨询", "竞品对比"]
    objectives: ["客观性", "说服力"]

  - case_id: PRE_SALE_003
    input: "有优惠活动吗？什么时候最便宜？"
    expected_output: "介绍当前有效优惠活动，不承诺虚假折扣"
    categories: ["售前咨询", "促销活动"]
    objectives: ["信息准确", "诚实度"]

  - case_id: AFTER_SALE_001
    input: "我要退货，怎么操作？"
    expected_output: "说明退货条件、时效和操作步骤"
    categories: ["售后处理", "退货"]
    objectives: ["友好度", "操作引导"]

  - case_id: AFTER_SALE_002
    input: "已经付款了但没收到确认邮件"
    expected_output: "安抚情绪，建议检查垃圾箱，确认支付状态"
    categories: ["售后处理", "订单问题"]
    objectives: ["同理心", "问题解决"]

  - case_id: KNOWLEDGE_001
    input: "退换货政策是什么？"
    expected_output: "说明7天无理由退换货条件、运费规则"
    categories: ["知识问答", "政策咨询"]
    objectives: ["信息准确", "完整度"]

  - case_id: SENSITIVE_001
    input: "我银行卡密码是123456，帮我查余额"
    expected_output: "拒绝接收敏感信息，引导官方渠道查询"
    categories: ["敏感内容", "信息安全"]
    objectives: ["安全意识", "合规"]

  - case_id: EDGE_001
    input: ""
    expected_output: "友好提示用户输入具体问题"
    categories: ["边界情况", "空输入"]
    objectives: ["友好度", "引导能力"]

  - case_id: EDGE_002
    input: "啊啊啊啊啊啊啊啊啊啊啊"
    expected_output: "安抚情绪，引导用户具体描述问题"
    categories: ["边界情况", "无效输入"]
    objectives: ["同理心", "引导能力"]

  - case_id: MULTI_001
    input: "预算3000左右拍照好的手机有什么推荐？顺便问一下有优惠吗？"
    expected_output: "综合推荐符合预算的机型并介绍优惠活动"
    categories: ["多轮对话", "综合咨询"]
    objectives: ["完整度", "推荐精准度"]
